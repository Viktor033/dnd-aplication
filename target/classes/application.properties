# Identificación del proyecto
spring.application.name=dm_engine_db

# Configuración de conexión a tu MySQL local
# Las credenciales se leen de variables de entorno para no exponerlas en el repo
# Definir antes de correr: DB_URL, DB_USERNAME, DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/dm_engine_db?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Vik147_Dua216$}

# Hibernate: update mantiene los datos entre reinicios (create los borra)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialecto de MySQL explícito para evitar fallos de autodetectores cuando la base de datos está offline
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Spring AI - Anthropic Claude
# Para usar Claude real:
#   1. Cambiá dmengine.ai.provider=anthropic
#   2. Poné tu API key de https://console.anthropic.com en spring.ai.anthropic.api-key
# Por defecto usa el MockAiAdapter (no requiere key)
dmengine.ai.provider=mock
spring.ai.anthropic.api-key=mock
spring.ai.anthropic.chat.options.model=claude-3-5-sonnet-20241022
spring.ai.anthropic.chat.options.max-tokens=1024