# Identificación del proyecto
spring.application.name=dm_engine_db

# Configuración de conexión a tu MySQL local
spring.datasource.url=jdbc:mysql://localhost:3306/dm_engine_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
# CORREGIDO: sin comillas simples alrededor de la contraseña
spring.datasource.password=Vik147_Dua216$

# Hibernate: update mantiene los datos entre reinicios (create los borra)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect detectado automáticamente por Hibernate 6, no hace falta especificarlo
spring.jpa.open-in-view=false

# Spring AI - Anthropic Claude
# Para usar Claude real:
#   1. Cambiá dmengine.ai.provider=anthropic
#   2. Poné tu API key de https://console.anthropic.com en spring.ai.anthropic.api-key
# Por defecto usa el MockAiAdapter (no requiere key)
dmengine.ai.provider=mock
spring.ai.anthropic.api-key=mock
spring.ai.anthropic.chat.options.model=claude-3-5-sonnet-20241022
spring.ai.anthropic.chat.options.max-tokens=1024